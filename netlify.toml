[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — every unknown path serves index.html so React Router-style
# deep links work. The /api/* path is intentionally excluded; if you want the
# LLM-backed chatbot on Netlify, port api/chat.js to netlify/functions/chat.js
# and add a redirect from /api/chat to /.netlify/functions/chat.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
